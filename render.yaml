# Render Blueprint — deploys the ABC Behavior Tracker (web app + Anthropic proxy)
# as a single Docker web service. See server/DEPLOY.md for the full walkthrough.
#
# After the first deploy, set both secret values in the Render dashboard
# (Service → Environment → Environment Variables), since both are declared
# sync:false below and so are left blank by the blueprint:
#   ANTHROPIC_API_KEY  your sk-ant-... key (the proxy always uses this key)
#   APP_PASSWORD       the staff login password for the app's Basic-auth gate
# Paste each value with no surrounding quotes and no trailing newline.
services:
  - type: web
    name: abc-behavior-tracker
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter         # Starter (or higher) is required for a persistent disk
                          # and keeps the app always-on (no free-tier cold starts).
    healthCheckPath: /healthz   # unauthenticated probe (the app itself is gated)
    autoDeploy: true
    # Persistent disk for the shared ABC-log store (/data/logs.json) so all pilot
    # users sync to the same data and it survives restarts/deploys.
    disk:
      name: data
      mountPath: /data
      sizeGB: 1
    envVars:
      # Server-side Anthropic key. Set the value in the Render dashboard (secret).
      - key: ANTHROPIC_API_KEY
        sync: false
      # Staff password gate. Set the value in the Render dashboard (it's a secret).
      - key: APP_PASSWORD
        sync: false
      # Where the shared log store lives (matches the disk mountPath above).
      - key: DATA_DIR
        value: /data
